<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Book Haven</title>
    <meta name="description" content="Review your cart items and proceed to checkout on Book Haven.">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .skeleton { background: linear-gradient(90deg, var(--border-color) 25%, var(--card-bg) 50%, var(--border-color) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-line { height: 18px; margin-bottom: 12px; }
        .badge-buy  { background: var(--accent-color); color: #fff; font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .badge-rent { background: #e67e22; color: #fff; font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 14px 20px; border-radius: 10px; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); animation: slideIn 0.3s ease; }
        .toast.error i { color: #e74c3c; } .toast.success i { color: var(--accent-color); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <nav>
        <div class="logo"><a href="index.html">BookHaven</a></div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search for books, authors...">
        </div>
        <div class="nav-actions">
            <a href="sell.html" style="color:var(--accent-color);border:1px solid var(--accent-color);padding:5px 15px;border-radius:20px;"><i class="fas fa-plus"></i> Sell</a>
            <a href="cart.html" style="color:var(--accent-color);"><i class="fas fa-shopping-cart"></i> Cart</a>
            <a href="orders.html"><i class="fas fa-box"></i> My Orders</a>
            <a href="account.html"><i class="fas fa-user"></i> My Account</a>
        </div>
    </nav>

    <main class="container main-content">
        <h1>Shopping Cart</h1>

        <div class="cart-container">
            <!-- Cart items loaded by AJAX -->
            <div class="cart-items" id="cart-items">
                <!-- Skeleton -->
                <div class="cart-item">
                    <div class="cart-item-img skeleton"></div>
                    <div class="cart-item-info" style="flex:1;">
                        <div class="skeleton skeleton-line" style="width:60%;"></div>
                        <div class="skeleton skeleton-line short" style="width:40%;"></div>
                    </div>
                </div>
            </div>

            <!-- Order summary loaded by AJAX -->
            <div class="order-summary" id="order-summary">
                <h3>Order Summary</h3>
                <div style="margin-top:20px;">
                    <div class="summary-row"><span>Subtotal</span><span class="skeleton skeleton-line" style="width:60px;display:inline-block;"></span></div>
                    <div class="summary-row"><span>Shipping</span><span style="color:var(--accent-color);">FREE</span></div>
                    <div class="summary-row"><span>Tax (8%)</span><span class="skeleton skeleton-line" style="width:50px;display:inline-block;"></span></div>
                    <div class="summary-row summary-total"><span>Total</span><span class="skeleton skeleton-line" style="width:70px;display:inline-block;"></span></div>
                </div>
                <button class="btn-primary" style="width:100%;margin-top:20px;" id="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <script>
        const toast = (msg, type = 'success') => {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3500);
        };

        function loadCart() {
            const userId = 1; // Demo: user_id=1 (replace with session value)
            const xhr = new XMLHttpRequest();
            xhr.open('GET', `../api/get_cart.php?user_id=${userId}`, true);

            xhr.onreadystatechange = function () {
                if (this.readyState !== 4) return;
                const itemsEl   = document.getElementById('cart-items');
                const summaryEl = document.getElementById('order-summary');

                if (this.status === 200) {
                    const xml = this.responseXML;
                    if (!xml) { itemsEl.innerHTML = '<div class="error-state">Failed to parse server response.</div>'; return; }

                    const errNode = xml.getElementsByTagName('error')[0];
                    if (errNode) {
                        itemsEl.innerHTML = `<div class="error-state">Error: ${errNode.textContent}</div>`;
                        toast(errNode.textContent, 'error');
                        return;
                    }

                    const items = xml.getElementsByTagName('item');

                    if (items.length === 0) {
                        itemsEl.innerHTML = `
                            <div class="empty-state" style="text-align:center;padding:60px 20px;">
                                <i class="fas fa-shopping-cart" style="font-size:3rem;opacity:0.3;margin-bottom:20px;"></i>
                                <p style="color:var(--secondary-color);">Your cart is empty.</p>
                                <a href="book.html" class="btn-primary" style="display:inline-block;margin-top:20px;">Browse Books</a>
                            </div>`;
                        return;
                    }

                    let itemsHtml = '';
                    for (let i = 0; i < items.length; i++) {
                        const g = (tag) => items[i].getElementsByTagName(tag)[0]?.textContent || '';
                        const action = g('action');
                        itemsHtml += `
                            <div class="cart-item">
                                <div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;"><i class="fas fa-book" style="opacity:0.3;font-size:1.6rem;"></i></div>
                                <div class="cart-item-info">
                                    <h4>${g('title')} <span class="badge-${action}">${action.toUpperCase()}</span></h4>
                                    <p style="color:var(--secondary-color);font-size:0.9rem;">${g('author')}</p>
                                    <p style="margin-top:10px;font-weight:600;">$${g('unit_price')} × ${g('quantity')} = <strong>$${g('line_total')}</strong></p>
                                </div>
                                <div class="cart-item-actions">
                                    <button class="qty-btn">-</button>
                                    <span>${g('quantity')}</span>
                                    <button class="qty-btn">+</button>
                                    <button style="color:#e74c3c;margin-left:10px;" title="Remove"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>`;
                    }
                    itemsEl.innerHTML = itemsHtml;

                    // Summary
                    const g = (tag) => xml.querySelector ? xml.querySelector(tag)?.textContent : xml.getElementsByTagName(tag)[0]?.textContent;
                    const summaryXml = xml.getElementsByTagName('summary')[0];
                    const getSumm = (tag) => summaryXml?.getElementsByTagName(tag)[0]?.textContent || '0.00';

                    summaryEl.innerHTML = `
                        <h3>Order Summary</h3>
                        <div style="margin-top:20px;">
                            <div class="summary-row"><span>Subtotal (${getSumm('item_count')} items)</span><span>$${getSumm('subtotal')}</span></div>
                            <div class="summary-row"><span>Shipping</span><span style="color:var(--accent-color);">FREE</span></div>
                            <div class="summary-row"><span>Tax (8%)</span><span>$${getSumm('tax')}</span></div>
                            <div class="summary-row summary-total"><span>Total</span><span>$${getSumm('total')}</span></div>
                        </div>
                        <button class="btn-primary" style="width:100%;margin-top:20px;" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
                    `;
                } else {
                    itemsEl.innerHTML = '<div class="error-state">Failed to connect to server.</div>';
                    toast('Server connection failed', 'error');
                }
            };
            xhr.send();
        }

        document.addEventListener('DOMContentLoaded', loadCart);
    </script>
</body>

</html>
