<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Book Haven</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav>
        <div class="logo"><a href="index.html">BookHaven</a></div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search for books, authors...">
        </div>

        <div class="nav-actions">
            <a href="cart.html" style="color: var(--accent-color);"><i class="fas fa-shopping-cart"></i> Cart</a>
            <a href="orders.html"><i class="fas fa-box"></i> My Orders</a>
            <a href="signin.html"><i class="fas fa-user"></i> My Account</a>
        </div>
    </nav>

    <main class="container main-content">
        <h1>Shopping Cart</h1>

        <div class="cart-container">
            <div class="cart-items">
                <!-- Item 1 -->
                <div class="cart-item">
                    <div class="cart-item-img"></div>
                    <div class="cart-item-info">
                        <h4>The Great Gatsby</h4>
                        <p style="color: var(--secondary-color); font-size: 0.9rem;">F. Scott Fitzgerald</p>
                        <p style="margin-top: 10px; font-weight: 600;">$12.99</p>
                    </div>
                    <div class="cart-item-actions">
                        <button class="qty-btn">-</button>
                        <span>1</span>
                        <button class="qty-btn">+</button>
                        <button style="color: #e74c3c; margin-left:10px;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>

                <!-- Item 2 -->
                <div class="cart-item">
                    <div class="cart-item-img"></div>
                    <div class="cart-item-info">
                        <h4>Atomic Habits</h4>
                        <p style="color: var(--secondary-color); font-size: 0.9rem;">James Clear</p>
                        <p style="margin-top: 10px; font-weight: 600;">$18.00</p>
                    </div>
                    <div class="cart-item-actions">
                        <button class="qty-btn">-</button>
                        <span>1</span>
                        <button class="qty-btn">+</button>
                        <button style="color: #e74c3c; margin-left:10px;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>

            <div class="order-summary">
                <h3>Order Summary</h3>
                <div style="margin-top: 20px;">
                    <div class="summary-row">
                        <span>Subtotal (2 items)</span>
                        <span>$30.99</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span style="color: var(--accent-color);">FREE</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax</span>
                        <span>$2.48</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span>$33.47</span>
                    </div>
                </div>
                <button class="btn-primary" style="width: 100%; margin-top: 20px;">Proceed to Checkout</button>
            </div>
        </div>
    </main>
</body>

</html>
