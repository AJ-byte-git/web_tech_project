<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Book Haven</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav>
        <div class="logo"><a href="index.html">BookHaven</a></div>
        <div class="nav-actions">
            <span style="color: var(--secondary-color); font-weight: 600;">Secure Checkout <i class="fas fa-lock"
                    style="margin-left: 5px;"></i></span>
        </div>
    </nav>

    <main class="container main-content">
        <div class="cart-container">
            <div class="cart-items">
                <h3 style="margin-bottom: 25px;">Shipping Address</h3>
                <form action="#">
                    <div class="input-group">
                        <label for="address">Full Address</label>
                        <input type="text" id="address" placeholder="123 Street Name, Apartment, Suite" required>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label for="city">City</label>
                            <input type="text" id="city" placeholder="e.g. New York" required>
                        </div>
                        <div class="input-group">
                            <label for="zip">ZIP Code</label>
                            <input type="text" id="zip" placeholder="10001" required>
                        </div>
                    </div>

                    <h3 style="margin: 40px 0 25px 0;">Payment Method</h3>
                    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                        <label class="glass-effect"
                            style="flex: 1; padding: 20px; border-radius: 8px; border: 2px solid var(--accent-color); cursor: pointer; display: flex; align-items: center; gap: 15px;">
                            <input type="radio" name="pay" checked>
                            <span>Credit / Debit Card</span>
                            <i class="fab fa-cc-visa" style="margin-left: auto; font-size: 1.5rem;"></i>
                        </label>
                        <label class="glass-effect"
                            style="flex: 1; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; gap: 15px;">
                            <input type="radio" name="pay">
                            <span>PayPal</span>
                            <i class="fab fa-paypal" style="margin-left: auto; font-size: 1.5rem;"></i>
                        </label>
                    </div>

                    <div class="input-group">
                        <label for="card">Card Number</label>
                        <input type="text" id="card" placeholder="0000 0000 0000 0000">
                    </div>
                    <div class="form-row" style="grid-template-columns: 2fr 1fr;">
                        <div class="input-group">
                            <label for="exp">Expiry Date</label>
                            <input type="text" id="exp" placeholder="MM / YY">
                        </div>
                        <div class="input-group">
                            <label for="cvv">CVV</label>
                            <input type="text" id="cvv" placeholder="123">
                        </div>
                    </div>
                </form>
            </div>

            <div class="order-summary">
                <h3>Final Summary</h3>
                <div style="margin-top: 20px;">
                    <div class="summary-row">
                        <span>Items Total</span>
                        <span>$30.99</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery</span>
                        <span>$0.00</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Grand Total</span>
                        <span>$30.99</span>
                    </div>
                </div>
                <button class="btn-primary"
                    style="width: 100%; margin-top: 20px; background-color: var(--accent-color);">Place Order
                    Now</button>
                <p style="text-align: center; color: var(--secondary-color); font-size: 0.8rem; margin-top: 15px;">By
                    clicking, you agree to our terms of service.</p>
            </div>
        </div>
    </main>
</body>

</html>
