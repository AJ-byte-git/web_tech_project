<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Haven - Buy and Rent Books</title>
  <link rel="stylesheet" href="theme.css" />
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body>
  <nav>
    <div class="logo">BookHaven</div>

    <div class="search-container">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Search for books, authors, or genres..." />
    </div>

    <div class="nav-actions">
      <a href="sell.html"
        style="color: var(--accent-color); border: 1px solid var(--accent-color); padding: 5px 15px; border-radius: 20px;"><i
          class="fas fa-plus"></i> Sell</a>
      <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a>
      <a href="orders.html"><i class="fas fa-box"></i> My Orders</a>
      <a href="account.html"><i class="fas fa-user"></i> My Account</a>
      <button class="theme-toggle"><i class="fas fa-moon"></i></button>
    </div>
  </nav>

  <main class="container main-content">
    <div class="grid-header">
      <h2>Discover Books</h2>
      <div class="filters">
        <span style="color: var(--secondary-color); font-size: 0.9rem">Filter by: Newest</span>
      </div>
    </div>

    <div id="book-grid" class="book-grid">
      <!-- Books will be loaded here via AJAX -->
      <div class="loading-state">Loading books...</div>
    </div>
  </main>

  <a href="#" class="back-to-top"><i class="fas fa-arrow-up"></i></a>
  <div id="toast-container"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
  <script src="jquery-features.js"></script>
</body>

</html>
