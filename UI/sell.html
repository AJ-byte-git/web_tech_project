<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Your Book - Book Haven</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav>
        <div class="logo"><a href="index.html">BookHaven</a></div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search for books, authors...">
        </div>

        <div class="nav-actions">
            <a href="sell.html"
                style="color: var(--accent-color); border: 1px solid var(--accent-color); padding: 5px 15px; border-radius: 20px; background: rgba(22, 160, 133, 0.1);"><i
                    class="fas fa-plus"></i> Sell</a>
            <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a>
            <a href="orders.html"><i class="fas fa-box"></i> My Orders</a>
            <a href="account.html"><i class="fas fa-user"></i> My Account</a>
        </div>
    </nav>

    <main class="container main-content">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1>Sell or Rent Your Book</h1>
            <p style="color: var(--secondary-color);">Turn your read books into someone else's treasure</p>
        </div>

        <div class="form-card">
            <form action="#">
                <div class="upload-area">
                    <i class="fas fa-cloud-upload-alt"
                        style="font-size: 3rem; color: var(--accent-color); margin-bottom: 15px; display: block;"></i>
                    <h4>Upload Book Cover</h4>
                    <p style="color: var(--secondary-color); font-size: 0.9rem; margin-top: 5px;">Drag & drop or click
                        to browse (Max 5MB)</p>
                </div>

                <div class="input-group">
                    <label for="btitle">Book Title</label>
                    <input type="text" id="btitle" placeholder="e.g. The Hobbit" required>
                </div>

                <div class="input-group">
                    <label for="bauthor">Author Name</label>
                    <input type="text" id="bauthor" placeholder="e.g. J.R.R. Tolkien" required>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="category">Category</label>
                        <select id="category"
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--white);">
                            <option>Fiction</option>
                            <option>Non-Fiction</option>
                            <option>Sci-Fi</option>
                            <option>Education</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="condition">Condition</label>
                        <select id="condition"
                            style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--white);">
                            <option>New</option>
                            <option>Like New</option>
                            <option>Used - Good</option>
                            <option>Used - Fair</option>
                        </select>
                    </div>
                </div>

                <h3 style="margin: 30px 0 20px 0;">Pricing Options</h3>
                <div class="form-row">
                    <div class="input-group">
                        <label for="sell-price">Selling Price ($)</label>
                        <input type="number" id="sell-price" placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label for="rent-price">Renting Price ($ / week)</label>
                        <input type="number" id="rent-price" placeholder="0.00">
                    </div>
                </div>

                <div class="input-group">
                    <label for="desc">Brief Description</label>
                    <textarea id="desc" rows="5"
                        style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; outline: none;"
                        placeholder="Tell buyers more about the book's edition, condition, or why you liked it..."></textarea>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="confirm-list" required>
                    <label for="confirm-list">I confirm this book is in my possession and the details are
                        accurate.</label>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 15px;">List Book for
                    Sale/Rent</button>
            </form>
        </div>
    </main>
</body>

</html>
