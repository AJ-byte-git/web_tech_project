<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Book Haven</title>
    <link rel="stylesheet" href="theme.css">
</head>

<body>
    <div class="container">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p style="color: var(--secondary-color); margin-bottom: 30px;">Sign in to your account</p>

            <form action="#">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#" style="color: var(--accent-color);">Terms and
                            Conditions</a></label>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <div class="auth-links">
                <p><a href="#">Forgot password?</a></p>
                <p style="margin-top: 15px;">Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </div>
</body>

</html>
