<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Book Haven</title>
    <link rel="stylesheet" href="theme.css">
</head>

<body>
    <div class="container">
        <div class="auth-card">
            <div class="logo" style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                <a href="index.html">BookHaven</a>
                <button class="theme-toggle"><i class="fas fa-moon"></i></button>
            </div>
            <h1>Create Account</h1>
            <p style="color: var(--secondary-color); margin-bottom: 30px;">Join our community of book lovers</p>

            <form action="#">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#" style="color: var(--accent-color);">Terms and
                            Conditions</a></label>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="signin.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
    <script src="jquery-features.js"></script>
</body>

</html>
